<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            padding: 20px;
        }
        h2 {
            text-align: center;
        }
        form {
            background-color: white;
            padding: 20px;
            width: 400px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
        }
        input {
            width:95%;
            padding: 8px;
            margin: 8px 0 15px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h2>Student Form</h2>

<form th:action="@{/students/add}" th:object="${student}" method="post">
    
    <label>First Name</label>
    <input type="text" th:field="*{firstName}" required />

    <label>Last Name</label>
    <input type="text" th:field="*{lastName}" required />

    <label>Email</label>
    <input type="email" th:field="*{email}" required />

    <label>Course</label>
    <input type="text" th:field="*{course}" required />

    <label>Age</label>
    <input type="number" th:field="*{age}" required />

    <button type="submit">Save Student</button>

    <a th:href="@{/students}">Back to List</a>
</form>

</body>
</html>
